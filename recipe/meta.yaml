{% set name = "django-treebeard" %}
{% set version = "5.0.0" %}
{% set sha256 = "5935d25ed992bbfb6f21b695d505f4d0d194abd61357dad33276dd483eaf68b5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - django >=5.2

test:
  imports:
    - treebeard
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/django-treebeard/django-treebeard
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Efficient tree implementations for Django
  description: |
    django-treebeard is a library that implements efficient
    tree implementations for the Django Web Framework 1.8 and later.
  doc_url: http://django-treebeard.readthedocs.io/en/latest/
  dev_url: https://github.com/django-treebeard/django-treebeard

extra:
  recipe-maintainers:
    - darynwhite
    - cshaley
    - sannykr
